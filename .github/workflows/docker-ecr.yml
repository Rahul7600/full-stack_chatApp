name: Selective CI/CD to AWS ECR (Single Repo)

on:
  push:
    branches:
      - main
  workflow_dispatch:  # Allows manual trigger if needed

jobs:
  build-frontend:
    runs-on: ubuntu-latest
    name: Build & Push Frontend Docker Image
    steps:
      - uses: actions/checkout@v3

      - name: Detect changes in frontend
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            frontend:
              - 'frontend/**'

      - name: Configure AWS credentials
        if: steps.changes.outputs.frontend == 'true'
        uses: aws-actions/configure-aws-credentials@v3
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        if: steps.changes.outputs.frontend == 'true'
        run: |
          aws ecr get-login-password | docker login --username AWS --password-stdin \
          ${{ secrets.ECR_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com

      - name: Build and Push Frontend Image
        if: steps.changes.outputs.frontend == 'true'
        working-directory: frontend
        run: |
          IMAGE=${{ secrets.ECR_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/${{ secrets.ECR_REPO_NAME }}:frontend-latest
          echo "🛠️ Building $IMAGE..."
          docker build -t $IMAGE .
          docker push $IMAGE

      - name: Skip Frontend Build
        if: steps.changes.outputs.frontend != 'true'
        run: echo "✅ No changes in frontend — skipping build."

  build-backend:
    runs-on: ubuntu-latest
    name: Build & Push Backend Docker Image
    steps:
      - uses: actions/checkout@v3

      - name: Detect changes in backend
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend:
              - 'backend/**'

      - name: Configure AWS credentials
        if: steps.changes.outputs.backend == 'true'
        uses: aws-actions/configure-aws-credentials@v3
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        if: steps.changes.outputs.backend == 'true'
        run: |
          aws ecr get-login-password | docker login --username AWS --password-stdin \
          ${{ secrets.ECR_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com

      - name: Build and Push Backend Image
        if: steps.changes.outputs.backend == 'true'
        working-directory: backend
        run: |
          IMAGE=${{ secrets.ECR_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/${{ secrets.ECR_REPO_NAME }}:backend-latest
          echo "🛠️ Building $IMAGE..."
          docker build -t $IMAGE .
          docker push $IMAGE

      - name: Skip Backend Build
        if: steps.changes.outputs.backend != 'true'
        run: echo "✅ No changes in backend — skipping build."
