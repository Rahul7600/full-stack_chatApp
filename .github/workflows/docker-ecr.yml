name: Selective CI/CD to AWS ECR (Single Repo)

on:
  push:
    branches:
      - main

jobs:
  build-frontend:
    runs-on: ubuntu-latest
    name: Build & Push Frontend Docker Image
    steps:
      - uses: actions/checkout@v3

      - name: Check if frontend directory changed
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            frontend:
              - 'frontend/**'

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v3
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to ECR
        run: |
          echo "🔐 Logging in to AWS ECR..."
          aws ecr get-login-password | docker login --username AWS --password-stdin \
          ${{ secrets.ECR_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com

      - name: Build and Push Frontend Docker Image
        working-directory: frontend
        run: |
          if [[ "${{ steps.changes.outputs.frontend }}" == "true" ]]; then
            IMAGE=${{ secrets.ECR_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/${{ secrets.ECR_REPO_NAME }}:frontend-latest
            echo "🛠️ Changes detected in frontend. Building $IMAGE..."
            docker build -t $IMAGE .
            docker push $IMAGE
          else
            echo "✅ No changes in frontend, skipping build & push."
          fi

  build-backend:
    runs-on: ubuntu-latest
    name: Build & Push Backend Docker Image
    steps:
      - uses: actions/checkout@v3

      - name: Check if backend directory changed
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend:
              - 'backend/**'

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v3
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to ECR
        run: |
          echo "🔐 Logging in to AWS ECR..."
          aws ecr get-login-password | docker login --username AWS --password-stdin \
          ${{ secrets.ECR_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com

      - name: Build and Push Backend Docker Image
        working-directory: backend
        run: |
          if [[ "${{ steps.changes.outputs.backend }}" == "true" ]]; then
            IMAGE=${{ secrets.ECR_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/${{ secrets.ECR_REPO_NAME }}:backend-latest
            echo "🛠️ Changes detected in backend. Building $IMAGE..."
            docker build -t $IMAGE .
            docker push $IMAGE
          else
            echo "✅ No changes in backend, skipping build & push."
          fi
