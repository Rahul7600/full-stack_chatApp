name: Fullstack ChatApp CI/CD to ECR (with version fallback)

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      version:
        description: 'Tag version (e.g. v1.0.0)'
        required: false

jobs:
  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set VERSION variable
        run: |
          VERSION="${{ github.event.inputs.version }}"
          if [ -z "$VERSION" ]; then
            VERSION=$(echo $GITHUB_SHA | cut -c1-7)
          fi
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Build and push frontend image
        run: |
          IMAGE_URI=223319878711.dkr.ecr.ap-south-1.amazonaws.com/rahulrepo/frontend
          docker build -t $IMAGE_URI:latest -t $IMAGE_URI:$VERSION ./frontend
          docker push $IMAGE_URI:latest
          docker push $IMAGE_URI:$VERSION

  build-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set VERSION variable
        run: |
          VERSION="${{ github.event.inputs.version }}"
          if [ -z "$VERSION" ]; then
            VERSION=$(echo $GITHUB_SHA | cut -c1-7)
          fi
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Build and push backend image
        run: |
          IMAGE_URI=223319878711.dkr.ecr.ap-south-1.amazonaws.com/rahulrepo/backend
          docker build -t $IMAGE_URI:latest -t $IMAGE_URI:$VERSION ./backend
          docker push $IMAGE_URI:latest
          docker push $IMAGE_URI:$VERSION
