name: Fullstack ChatApp CI/CD with ECR & Minikube

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      version:
        description: 'Image tag version (e.g. v1.0.0)'
        required: false

env:
  AWS_REGION: ap-south-1
  FRONTEND_REPO: 223319878711.dkr.ecr.ap-south-1.amazonaws.com/rahulrepo/frontend
  BACKEND_REPO: 223319878711.dkr.ecr.ap-south-1.amazonaws.com/rahulrepo/backend

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set VERSION
        run: |
          VERSION="${{ github.event.inputs.version }}"
          if [ -z "$VERSION" ]; then
            VERSION=$(echo $GITHUB_SHA | cut -c1-7)
          fi
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & Push Frontend Image
        run: |
          docker build -t $FRONTEND_REPO:latest -t $FRONTEND_REPO:$VERSION ./frontend
          docker push $FRONTEND_REPO:latest
          docker push $FRONTEND_REPO:$VERSION

      - name: Build & Push Backend Image
        run: |
          docker build -t $BACKEND_REPO:latest -t $BACKEND_REPO:$VERSION ./backend
          docker push $BACKEND_REPO:latest
          docker push $BACKEND_REPO:$VERSION

  deploy-to-minikube:
    runs-on: self-hosted  # runner must be on your EC2/minikube machine
    needs: build-and-push
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set VERSION again
        run: |
          VERSION="${{ github.event.inputs.version }}"
          if [ -z "$VERSION" ]; then
            VERSION=$(echo $GITHUB_SHA | cut -c1-7)
          fi
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Apply frontend deployment
        run: |
          sed "s|__VERSION__|$VERSION|g" frontend-deployment.yaml | kubectl apply -f -

      - name: Apply backend deployment
        run: |
          sed "s|__VERSION__|$VERSION|g" backend-deployment.yaml | kubectl apply -f -
