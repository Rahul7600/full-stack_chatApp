name: Fullstack ChatApp CI/CD to ECR

on:
  push:
    branches: [main]

jobs:
  build-frontend:
    runs-on: ubuntu-latest
    if: contains(github.event.head_commit.message, 'frontend') || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Get short SHA for build number
        id: vars
        run: echo "BUILD_NUM=$(echo $GITHUB_SHA | cut -c1-7)" >> $GITHUB_ENV

      - name: Build, tag, and push frontend image
        run: |
          IMAGE_URI=223319878711.dkr.ecr.ap-south-1.amazonaws.com/rahulrepo
          docker build -t $IMAGE_URI/frontend:${BUILD_NUM} ./frontend
          docker tag $IMAGE_URI/frontend:${BUILD_NUM} $IMAGE_URI/frontend:latest
          docker push $IMAGE_URI/frontend:${BUILD_NUM}
          docker push $IMAGE_URI/frontend:latest

  build-backend:
    runs-on: ubuntu-latest
    if: contains(github.event.head_commit.message, 'backend') || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Get short SHA for build number
        id: vars
        run: echo "BUILD_NUM=$(echo $GITHUB_SHA | cut -c1-7)" >> $GITHUB_ENV

      - name: Build, tag, and push backend image
        run: |
          IMAGE_URI=223319878711.dkr.ecr.ap-south-1.amazonaws.com/rahulrepo
          docker build -t $IMAGE_URI/backend:${BUILD_NUM} ./backend
          docker tag $IMAGE_URI/backend:${BUILD_NUM} $IMAGE_URI/backend:latest
          docker push $IMAGE_URI/backend:${BUILD_NUM}
          docker push $IMAGE_URI/backend:latest
